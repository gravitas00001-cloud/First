{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111827'/%3E%3Cpath d='M18 20h28v6H24v10h18v6H24v12h-6V20Z' fill='%23f3f4f6'/%3E%3C/svg%3E" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'Core/app.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="page-shell {% block body_class %}{% endblock %}">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>
    <div class="shell-grid"></div>
    {{ frontend_config|json_script:"fake-kilo-config" }}
    {% block content %}{% endblock %}
    <script src="{% static 'Core/app.js' %}" defer></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
